<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cronômetro</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="conteudo-principal">
      <h1 class="titulo-principal">Cronômetro</h1>
      <div class="display" id="display">00:00:00</div>
      <div class="botoes">
        <button class="botao" id="startBtn" type="button">Iniciar</button>
        <button class="botao" id="pauseBtn" type="button" disabled>Pausar</button>
        <button class="botao" id="resetBtn" type="button">Zerar</button>
      </div>
    </section>
    <script src="main.js"></script>
  </body>
</html>
